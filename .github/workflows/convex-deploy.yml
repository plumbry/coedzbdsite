name: Deploy Convex

on:
  push:
    branches:
      - main
    paths:
      - "convex/**"
      - "convex.json"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

concurrency:
  group: convex-deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Convex to production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy Convex functions
        run: npx convex deploy --yes
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
